name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # The script runs the exact commands you typed manually!
          script: |
            # Navigate to where your project is cloned
            cd /home/ec2-user/aws
            
            # Pull the latest code 
            git pull origin main
            
            # Rebuild and restart the Docker containers in the background
            docker-compose up --build -d
            
            # Remove any old dangling images to save disk space
            docker image prune -f

version: '3.8'
services:
  backend:
    build: ./backend
    container_name: aws_backend
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: aws_frontend
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:latest
    container_name: aws_nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount the built Vite frontend files into the NGINX container
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    restart: always

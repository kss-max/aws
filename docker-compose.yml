version: '3.8'
services:
  backend:
    image: nishitsk/eventsphere-backend:latest
    container_name: aws_backend
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    image: nishitsk/eventsphere-frontend:latest
    container_name: aws_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: always

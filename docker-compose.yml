version: '3.8'
services:
  backend:
    image: koushikmax23/aws-backend:latest
    container_name: aws_backend
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/aws_db
    depends_on:
      - mongo
    restart: always

  frontend:
    image: koushikmax23/aws-frontend:latest
    container_name: aws_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: always

  mongo:
    image: mongo:latest
    container_name: aws_mongo
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
